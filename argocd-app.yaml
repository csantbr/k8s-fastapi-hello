apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fastapi-hello
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/csantbr/k8s-fastapi-hello.git
    targetRevision: HEAD
    path: k8s-manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
