apiVersion: apps/v1
kind: Deployment
metadata:
  name: cpp-hello
  namespace: default
  labels:
    app: cpp-hello
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cpp-hello
  template:
    metadata:
      labels:
        app: cpp-hello
    spec:
      containers:
        - name: cpp-hello
          image: cpp-hello:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "100m"
